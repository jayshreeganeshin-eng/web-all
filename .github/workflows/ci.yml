name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  checks:
    name: Run tests and basic checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Run unit tests
        run: |
          python -m pytest -q
        continue-on-error: true

      - name: Run basic static checks
        run: |
          python -m ruff check . --select E,F,W --exclude build,web_all.egg-info
        continue-on-error: true
