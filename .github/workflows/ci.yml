name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'web_all/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
  pull_request:
    branches: [main, master]
    paths:
      - 'web_all/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'

jobs:
  checks:
    name: Run tests and basic checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Run unit tests
        run: |
          python -m pytest -q --tb=short

      - name: Verify version
        run: |
          python -c "import web_all; assert web_all.__version__ == '4.5.0'"
