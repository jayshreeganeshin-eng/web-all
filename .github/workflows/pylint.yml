name: Pylint

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install aiohttp beautifulsoup4 lxml playwright fastapi pydantic uvicorn requests pytest tqdm cssutils python-multipart yt-dlp
        pip install -e .
    - name: Install Playwright browsers
      run: |
        playwright install chromium
    - name: Analysing the code with pylint
      run: |
        pylint $(git ls-files '*.py') --max-line-length=120 --disable=R0801,C0115,C0116,R0903,R0913,R0917,W0511
