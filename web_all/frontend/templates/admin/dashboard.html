<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - web_all</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar admin-navbar">
        <div class="container">
            <div class="logo">🔐 web_all Admin</div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/dashboard">User Dashboard</a></li>
                <li><a href="/admin">Admin Panel</a></li>
                <li><a href="/logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h1>Admin Panel</h1>
        
        <section class="admin-section">
            <h2>System Overview</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="totalUsers">0</h3>
                    <p>Total Users</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalProjects">0</h3>
                    <p>Total Projects</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalAnalyses">0</h3>
                    <p>SEO Analyses</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalContent">0</h3>
                    <p>Generated Content</p>
                </div>
            </div>
        </section>

        <section class="admin-section">
            <h2>User Management</h2>
            <button id="refreshUsersBtn" class="btn">Refresh</button>
            <table id="usersTable" class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Users will be loaded here -->
                </tbody>
            </table>
        </section>

        <section class="admin-section">
            <h2>Audit Logs</h2>
            <button id="refreshLogsBtn" class="btn">Refresh</button>
            <table id="auditLogsTable" class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Resource</th>
                        <th>Details</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Logs will be loaded here -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="/static/js/admin.js"></script>
</body>
</html>
